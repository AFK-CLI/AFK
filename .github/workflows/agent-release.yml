name: Agent Release

on:
  push:
    tags: ['agent-v*']

concurrency:
  group: agent-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set keychain path
        run: echo "KEYCHAIN_PATH=$RUNNER_TEMP/build-${{ github.run_id }}.keychain-db" >> "$GITHUB_ENV"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.AGENT_PROVISIONING_PROFILE }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$RUNNER_TEMP/agent_profile.provisionprofile"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$RUNNER_TEMP/agent_profile.provisionprofile"))
          cp "$RUNNER_TEMP/agent_profile.provisionprofile" "$PROFILE_DIR/$PROFILE_UUID.provisionprofile"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "AFK-Notarize" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID" \
            --keychain "$KEYCHAIN_PATH"

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/agent-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing agent v$VERSION"

      - name: Write AgentSecrets.xcconfig
        env:
          AGENT_SECRETS_XCCONFIG: ${{ secrets.AGENT_SECRETS_XCCONFIG }}
        run: |
          echo "$AGENT_SECRETS_XCCONFIG" | base64 --decode > config/AgentSecrets.xcconfig

      - name: Build, notarize, and package
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          BUNDLE_ID: dev.ahmetbirinci.AFK-Agent
          PROVISIONING_PROFILE_SPECIFIER: AFK Agent DevID
          NOTARIZE_PROFILE: AFK-Notarize
        run: |
          chmod +x agent/scripts/build-release.sh
          cd agent && ./scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agent/build/release/AFK-Agent-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

      - name: Generate appcast
        env:
          SPARKLE_VERSION: "2.9.0"
        run: |
          SPARKLE_URL="https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          curl -sL "$SPARKLE_URL" -o "$RUNNER_TEMP/sparkle.tar.xz"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP" bin/generate_appcast
          VERSION="${{ steps.version.outputs.version }}"
          "$RUNNER_TEMP/bin/generate_appcast" \
            --download-url-prefix "https://github.com/AFK-CLI/AFK/releases/download/agent-v${VERSION}/" \
            agent/build/release/
          cp agent/build/release/appcast.xml appcast.xml || true

      - name: Commit appcast to main
        run: |
          if [ ! -f appcast.xml ]; then
            echo "No appcast.xml generated, skipping"
            exit 0
          fi
          cp appcast.xml "$RUNNER_TEMP/appcast.xml"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -f main
          cp "$RUNNER_TEMP/appcast.xml" appcast.xml
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast changes, skipping"
            exit 0
          fi
          git commit -m "chore: update appcast.xml for ${{ github.ref_name }}"
          git push origin main

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -f "$RUNNER_TEMP/agent_profile.provisionprofile"
