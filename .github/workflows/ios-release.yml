name: iOS Release

on:
  push:
    tags: ['ios-v*']

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-15
    permissions:
      contents: read
    env:
      KEYCHAIN_PATH: build-${{ github.run_id }}.keychain-db
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Install provisioning profiles
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          IOS_WIDGETS_PROVISIONING_PROFILE: ${{ secrets.IOS_WIDGETS_PROVISIONING_PROFILE }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          # Main app profile
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$RUNNER_TEMP/ios_profile.mobileprovision"
          APP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$RUNNER_TEMP/ios_profile.mobileprovision"))
          cp "$RUNNER_TEMP/ios_profile.mobileprovision" "$PROFILE_DIR/$APP_UUID.mobileprovision"

          # Widget extension profile
          echo "$IOS_WIDGETS_PROVISIONING_PROFILE" | base64 --decode > "$RUNNER_TEMP/widgets_profile.mobileprovision"
          WIDGETS_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$RUNNER_TEMP/widgets_profile.mobileprovision"))
          cp "$RUNNER_TEMP/widgets_profile.mobileprovision" "$PROFILE_DIR/$WIDGETS_UUID.mobileprovision"

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/ios-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing iOS v$VERSION"

      - name: Write Secrets.xcconfig
        env:
          IOS_SECRETS_XCCONFIG: ${{ secrets.IOS_SECRETS_XCCONFIG }}
        run: |
          echo "$IOS_SECRETS_XCCONFIG" | base64 --decode > config/Secrets.xcconfig

      - name: Archive
        run: |
          xcodebuild archive \
            -project ios/AFK.xcodeproj \
            -scheme AFK \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/AFK.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.version }}" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}"

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APP_STORE_CONNECT_KEY" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Export and upload to TestFlight
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>dev.ahmetbirinci.AFK</key>
              <string>AFK App Store</string>
              <key>dev.ahmetbirinci.AFK.AFKWidgets</key>
              <string>AFK Widgets App Store</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AFK.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -f "$RUNNER_TEMP/ios_profile.mobileprovision"
          rm -f "$RUNNER_TEMP/widgets_profile.mobileprovision"
          rm -rf "$RUNNER_TEMP/private_keys"
          rm -f "$RUNNER_TEMP/ExportOptions.plist"
