<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AFK — Verification Failed</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: linear-gradient(180deg, #0B1A2E 0%, #162D50 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 56px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.12) 0%,
                    rgba(255, 255, 255, 0.02) 50%,
                    rgba(255, 255, 255, 0.06) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 28px;
            opacity: 0;
            animation: logoIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(239, 68, 68, 0.6), transparent);
            margin: 0 auto 24px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0.6s forwards;
        }

        .x-wrap {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            position: relative;
            opacity: 0;
            animation: checkIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        .x-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.05));
            border: 1.5px solid rgba(239, 68, 68, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .x-ring svg {
            width: 24px;
            height: 24px;
        }

        .x-ring svg line {
            stroke: #ef4444;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            animation: draw 0.4s ease-out 0.8s forwards;
        }

        .x-wrap::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(239, 68, 68, 0.2);
            opacity: 0;
            animation: pulse 2s ease-out 1s infinite;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #f5f5f7;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            opacity: 0;
            animation: textIn 0.5s ease-out 0.7s forwards;
        }

        .sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            opacity: 0;
            animation: textIn 0.5s ease-out 0.85s forwards;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .msg {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            opacity: 0;
            animation: textIn 0.5s ease-out 0.95s forwards;
            line-height: 1.5;
        }

        .brand {
            margin-top: 28px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 1.1s forwards;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0) scale(1) }
        }

        @keyframes logoIn {
            from { opacity: 0; transform: scale(0.8) }
            to { opacity: 1; transform: scale(1) }
        }

        @keyframes checkIn {
            from { opacity: 0; transform: scale(0.5) }
            to { opacity: 1; transform: scale(1) }
        }

        @keyframes draw {
            to { stroke-dashoffset: 0 }
        }

        @keyframes textIn {
            from { opacity: 0; transform: translateY(8px) }
            to { opacity: 1; transform: translateY(0) }
        }

        @keyframes fadeIn {
            to { opacity: 1 }
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1) }
            100% { opacity: 0; transform: scale(1.4) }
        }
    </style>
</head>

<body>
    <canvas id="starfield"></canvas>

    <div class="card">
        <img class="logo" src="/icon.png" alt="AFK" width="72" height="72">
        <div class="divider"></div>
        <div class="x-wrap">
            <div class="x-ring">
                <svg viewBox="0 0 24 24" fill="none">
                    <line x1="7" y1="7" x2="17" y2="17" />
                    <line x1="17" y1="7" x2="7" y2="17" />
                </svg>
            </div>
        </div>
        <h1>Verification Failed</h1>
        <p class="sub">Something went wrong</p>
        <p class="msg">Invalid or expired verification link. Please try again.</p>
        <p class="brand">AFK</p>
    </div>

    <script>
        (function () {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let W, H;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random(),
                    y: Math.random(),
                    size: 1 + Math.random() * 1.5,
                    opacity: 0.3 + Math.random() * 0.4
                });
            }

            const meteors = [];
            for (let i = 0; i < 3; i++) {
                meteors.push({
                    startX: 0.05 + Math.random() * 0.9,
                    startY: Math.random() * 0.35,
                    angle: 0.4 + Math.random() * 0.6,
                    trail: 30 + Math.random() * 40,
                    speed: 250 + Math.random() * 200,
                    cycle: 5 + Math.random() * 7,
                    offset: Math.random() * 10
                });
            }

            let startTime = performance.now();

            function draw(now) {
                const t = (now - startTime) / 1000;
                ctx.clearRect(0, 0, W, H);

                for (const s of stars) {
                    ctx.beginPath();
                    ctx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
                    ctx.fill();
                }

                for (const m of meteors) {
                    const elapsed = (t + m.offset) % m.cycle;
                    const travelDur = m.trail * 2.5 / m.speed;
                    if (elapsed > travelDur) continue;

                    const progress = elapsed / travelDur;
                    const dist = progress * m.trail * 2.5;
                    const headX = m.startX * W + dist * Math.cos(m.angle);
                    const headY = m.startY * H + dist * Math.sin(m.angle);
                    const visTrail = Math.min(m.trail, dist);
                    const tailX = headX - visTrail * Math.cos(m.angle);
                    const tailY = headY - visTrail * Math.sin(m.angle);

                    let fade = 1;
                    if (progress < 0.1) fade = progress / 0.1;
                    else if (progress > 0.6) fade = 1 - (progress - 0.6) / 0.4;
                    if (fade < 0.01) continue;

                    const grad = ctx.createLinearGradient(tailX, tailY, headX, headY);
                    grad.addColorStop(0, 'rgba(255,255,255,0)');
                    grad.addColorStop(1, `rgba(255,255,255,${fade * 0.6})`);
                    ctx.beginPath();
                    ctx.moveTo(tailX, tailY);
                    ctx.lineTo(headX, headY);
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 1.2;
                    ctx.lineCap = 'round';
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(headX, headY, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${fade * 0.9})`;
                    ctx.fill();
                }

                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);
        })();
    </script>
</body>

</html>
