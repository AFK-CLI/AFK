services:
  # ── Production ──
  postgres:
    profiles: [prod]
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: afk
      POSTGRES_PASSWORD: ${AFK_DB_PASSWORD}
      POSTGRES_DB: afk
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afk"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  afk-cloud:
    profiles: [prod]
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VERSION: ${AFK_VERSION:-dev}
    ports:
      - "127.0.0.1:9847:9847"
    env_file:
      - ./backend/.env
    environment:
      - AFK_DATABASE_URL=postgres://afk:${AFK_DB_PASSWORD}@postgres:5432/afk?sslmode=disable
      - AFK_APNS_KEY_PATH=/secrets/apns-key.p8
    volumes:
      - ./secrets/apns-key.p8:/secrets/apns-key.p8:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9847/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx-prod:
    profiles: [prod]
    image: nginx:1.28.2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/afk.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./certbot-www:/var/www/certbot:ro
    depends_on:
      - afk-cloud
    restart: unless-stopped

  certbot:
    profiles: [prod]
    image: certbot/certbot:v5.3.1
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ── Dev ──
  postgres-dev:
    profiles: [dev]
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_USER: afk
      POSTGRES_PASSWORD: ${AFK_DB_PASSWORD:-devpassword}
      POSTGRES_DB: afk
    volumes:
      - pg-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afk"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  afk-cloud-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VERSION: ${AFK_VERSION:-dev}
    ports:
      - "127.0.0.1:9847:9847"
    env_file:
      - ./backend/.env.dev
    environment:
      - AFK_DATABASE_URL=postgres://afk:${AFK_DB_PASSWORD:-devpassword}@postgres-dev:5432/afk?sslmode=disable
      - AFK_APNS_KEY_PATH=/secrets/apns-key.p8
    volumes:
      - ./secrets/apns-key.p8:/secrets/apns-key.p8:ro
    depends_on:
      postgres-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9847/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx-dev:
    profiles: [dev]
    image: nginx:1.28.2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/afk-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - afk-cloud-dev
    restart: unless-stopped

volumes:
  pg-data:
  pg-data-dev:
