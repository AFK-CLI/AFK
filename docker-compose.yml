services:
  afk-cloud:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        VERSION: ${AFK_VERSION:-dev}
    ports:
      - "127.0.0.1:9847:9847"
    env_file:
      - ./backend/.env
    environment:
      - AFK_DB_PATH=/data/afk.db
      - AFK_APNS_KEY_PATH=/secrets/apns-key.p8
    volumes:
      - afk-data:/data
      - ./secrets/apns-key.p8:/secrets/apns-key.p8:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9847/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:1.28.2-alpine # pin to specific stable version; update periodically
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/afk.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./certbot-www:/var/www/certbot:ro
    depends_on:
      - afk-cloud
    restart: unless-stopped

  certbot:
    image: certbot/certbot:v5.3.1 # pin to specific version; update periodically
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  afk-data:
